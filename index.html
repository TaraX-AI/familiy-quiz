<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lustiges Family Quiz – Tanja Baltrusch</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;padding:16px;font-family:sans-serif}
  .card{background:#fff;border-radius:24px;padding:28px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  .header{text-align:center;margin-bottom:10px}
  .header h1{font-size:18px;font-weight:800;color:#667eea}
  .header p{font-size:12px;color:#aaa}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:10px}
  .meta span{font-size:13px;color:#999;font-weight:600}
  .badge{background:#f0edff;color:#667eea;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700}
  .progress-bar{background:#f0f0f0;border-radius:99px;height:8px;margin-bottom:24px}
  .progress-fill{background:linear-gradient(90deg,#667eea,#764ba2);border-radius:99px;height:8px;transition:width 0.4s}
  .question{text-align:center;margin-bottom:24px}
  .question .emoji{font-size:48px;margin-bottom:12px}
  .question h2{font-size:20px;color:#1a1a2e;line-height:1.4}
  .options{display:grid;gap:10px;margin-bottom:20px}
  .opt{background:#fff;border:2px solid #e8e8e8;border-radius:12px;padding:14px 16px;font-size:15px;color:#333;cursor:pointer;text-align:left;font-weight:500;display:flex;align-items:center;gap:10px;transition:all 0.2s;width:100%}
  .opt:hover{border-color:#667eea;background:#f0edff}
  .opt.correct{background:#d4f7f0;border-color:#4ECDC4;color:#1a7a6e}
  .opt.wrong{background:#ffe0e0;border-color:#FF6B6B;color:#a0001a}
  .opt.disabled{cursor:default}
  .opt.disabled:hover{border-color:#e8e8e8;background:#fff}
  .opt.correct.disabled:hover,.opt.wrong.disabled:hover{border-color:inherit;background:inherit}
  .label{background:#FF6B6B;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .btn{width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer}
  .result{text-align:center}
  .result .big{font-size:72px;margin-bottom:8px}
  .result h2{font-size:28px;margin-bottom:4px;color:#1a1a2e}
  .result .sub{color:#666;margin-bottom:20px}
  .score-box{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;padding:20px;margin-bottom:20px}
  .score-box .label2{color:rgba(255,255,255,0.8);font-size:14px}
  .score-box .num{color:#fff;font-size:52px;font-weight:800}
  .score-box .num span{font-size:28px}
  .dots{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
  .dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
  .hint{color:#aaa;font-size:13px;margin-bottom:16px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="card">
  <!-- QUIZ -->
  <div id="quiz">
    <div class="header">
      <h1>🎉 Lustiges Family Quiz</h1>
      <p>erstellt von Tanja Baltrusch</p>
    </div>
    <div class="meta">
      <span id="qnum">Frage 1 von 10</span>
      <span class="badge" id="pts">⭐ 0 Punkte</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="question">
      <div class="emoji" id="qemoji"></div>
      <h2 id="qtext"></h2>
    </div>
    <div class="options" id="opts"></div>
    <button class="btn hidden" id="nextbtn" onclick="next()">Nächste Frage →</button>
  </div>
  <!-- RESULT -->
  <div id="result" class="result hidden">
    <div class="big">🎉</div>
    <h2 id="rtitle"></h2>
    <p class="sub" id="rmsg"></p>
    <div class="score-box">
      <div class="label2">Dein Ergebnis</div>
      <div class="num" id="rnum"></div>
    </div>
    <div class="dots" id="rdots"></div>
    <p class="hint">🎲 Beim nächsten Mal kommen andere Fragen!</p>
    <button class="btn" onclick="startQuiz()">🔄 Nochmal spielen</button>
  </div>
</div>

  {q:"Was ist das größte Organ des menschlichen Körpers?",o:["Leber","Lunge","Haut","Gehirn"],a:2,e:"🫁"},
  {q:"Wie viele Rippen hat ein Mensch?",o:["22","24","26","28"],a:1,e:"🦴"},
  {q:"Welches Vitamin produziert der Körper durch Sonnenlicht?",o:["Vitamin A","Vitamin B","Vitamin C","Vitamin D"],a:3,e:"☀️"},

  {q:"Was ist ein Palindrom?",o:["Ein Wort, das rückwärts dasselbe ergibt","Ein Reimschema","Ein Stilmittel","Ein Dialekt"],a:0,e:"🔄"},
  {q:"Wie viele Sprachen gibt es weltweit (ca.)?",o:["2.000","4.000","7.000","10.000"],a:2,e:"🗣️"},
];

const COLORS = ["#FF6B6B","#4ECDC4","#FFE66D","#A78BFA"];
const RESULTS = [
  {min:0,max:2,t:"Frischling 🐣",m:"Nicht schlimm – du hast wenigstens mitgemacht!"},
  {min:3,max:5,t:"Neuling 🙈",m:"Ein bisschen mehr lernen schadet nicht!"},
  {min:6,max:7,t:"Halbwissender 🤔",m:"Solide! Du weißt genug, um nicht verloren zu wirken."},
  {min:8,max:9,t:"Cleverle 🧠",m:"Beeindruckend! Hast du heimlich gelernt?"},
  {min:10,max:10,t:"Quiz-Legende 🏆",m:"Perfekt! Bist du sicher, dass du nicht geschummelt hast?"},
];

let questions=[], cur=0, score=0, answers=[], locked=false;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}

function startQuiz(){
  questions=shuffle(ALL).slice(0,10);
  cur=0;score=0;answers=[];locked=false;
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');
  renderQ();
}

function renderQ(){
  const q=questions[cur];
  document.getElementById('qnum').textContent=`Frage ${cur+1} von ${questions.length}`;
  document.getElementById('pts').textContent=`⭐ ${score} Punkte`;
  document.getElementById('prog').style.width=`${(cur/questions.length)*100}%`;
  document.getElementById('qemoji').textContent=q.e;
  document.getElementById('qtext').textContent=q.q;
  const nb=document.getElementById('nextbtn');
  nb.classList.add('hidden');
  nb.textContent=cur+1>=questions.length?'Ergebnis sehen 🎯':'Nächste Frage →';
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="label" style="background:${COLORS[i]}">${['A','B','C','D'][i]}</span>${opt}`;
    btn.onclick=()=>choose(i);
    opts.appendChild(btn);
  });
  locked=false;
}

function choose(i){
  if(locked)return;
  locked=true;
  const q=questions[cur];
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.classList.add('disabled'));
  btns[q.a].classList.add('correct');
  if(i!==q.a)btns[i].classList.add('wrong');
  else score++;
  answers.push({correct:i===q.a});
  document.getElementById('nextbtn').classList.remove('hidden');
}

function next(){
  cur++;
  if(cur>=questions.length)showResult();
  else renderQ();
}

function showResult(){
  document.getElementById('quiz').classList.add('hidden');
  const res=document.getElementById('result');
  res.classList.remove('hidden');
  const r=RESULTS.find(x=>score>=x.min&&score<=x.max);
  document.getElementById('rtitle').textContent=r.t;
  document.getElementById('rmsg').textContent=r.m;
  document.getElementById('rnum').innerHTML=`${score}<span>/${questions.length}</span>`;
  const dots=document.getElementById('rdots');
  dots.innerHTML='';
  answers.forEach(a=>{
    const d=document.createElement('div');
    d.className='dot';
    d.style.background=a.correct?'#4ECDC4':'#FF6B6B';
    d.textContent=a.correct?'✓':'✗';
    dots.appendChild(d);
  });
}

startQuiz();
</script>
